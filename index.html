  document.getElementById('add-row-btn').addEventListener('click', () => openEditDialog(null));

  // 検索
  const searchInput = document.getElementById('word-search');
  function applySearchFilter() {
    const q = (searchInput.value || '').trim().toLowerCase();
    document.querySelectorAll('#word-list .word-item').forEach(li => {
      if (!q) { li.style.display = ''; return; }
      const txt = li.textContent.toLowerCase();
      li.style.display = txt.includes(q) ? '' : 'none';
    });
  }
  searchInput.addEventListener('input', applySearchFilter);

  // 一覧表示
  function renderList() {
    const list = document.getElementById('word-list');
    const count = document.getElementById('word-count');
    if (!list || !count) return;
    count.textContent = `登録漢字: ${activeDeck.words.length} 件`;
    if (activeDeck.words.length === 0) {
      list.innerHTML = '<li class="empty-list">まだ漢字がありません</li>';
      return;
    }
    const total = activeDeck.words.length;
    list.innerHTML = activeDeck.words.map((w, i) => `
      <li class="word-item" data-id="${w.id}" draggable="true">
        <span class="word-num">${i + 1}</span>
        <span class="word-jp">${escapeHtml(w.jp)}</span>
        <span class="word-en">${escapeHtml(w.en)}</span>
        <span class="word-reading">${escapeHtml(w.reading || '')}</span>
        <div class="word-actions">
          <button class="move-btn" data-dir="up" title="上へ"${i === 0 ? ' disabled' : ''}>↑</button>
          <button class="move-btn" data-dir="down" title="下へ"${i === total - 1 ? ' disabled' : ''}>↓</button>
          <button class="edit-btn" title="編集">✎</button>
          <button class="delete-btn" title="削除">×</button>
        </div>
      </li>
    `).join('');

    // 編集
    list.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openEditDialog(btn.closest('.word-item').dataset.id);
      });
    });

    // 並び替え（↑↓）
    list.querySelectorAll('.move-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (btn.disabled) return;
        const li = btn.closest('.word-item');
        const idx = activeDeck.words.findIndex(w => String(w.id) === li.dataset.id);
        if (idx < 0) return;
        const newIdx = idx + (btn.dataset.dir === 'up' ? -1 : 1);
        if (newIdx < 0 || newIdx >= activeDeck.words.length) return;
        [activeDeck.words[idx], activeDeck.words[newIdx]] = [activeDeck.words[newIdx], activeDeck.words[idx]];
        save();
        renderList();
      });
    });

    // 削除
    list.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const li = btn.closest('.word-item');
        const id = li.dataset.id;
        activeDeck.words = activeDeck.words.filter(w => String(w.id) !== id);
        save();
        renderList();
        renderDeckList();
      });
    });

    // ドラッグ&ドロップ
    let dragSrcId = null;
    list.querySelectorAll('.word-item').forEach(li => {
      li.addEventListener('dragstart', (e) => {
        dragSrcId = li.dataset.id;
        li.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', li.dataset.id);
      });
      li.addEventListener('dragend', () => {
        li.classList.remove('dragging');
        list.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el => {
          el.classList.remove('drag-over-top', 'drag-over-bottom');
        });
        dragSrcId = null;
      });
      li.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (!dragSrcId || li.dataset.id === dragSrcId) return;
        const rect = li.getBoundingClientRect();
        const above = (e.clientY - rect.top) < rect.height / 2;
        list.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el => {
          el.classList.remove('drag-over-top', 'drag-over-bottom');
        });
        li.classList.add(above ? 'drag-over-top' : 'drag-over-bottom');
        e.dataTransfer.dropEffect = 'move';
      });
      li.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!dragSrcId || li.dataset.id === dragSrcId) return;
        const rect = li.getBoundingClientRect();
        const above = (e.clientY - rect.top) < rect.height / 2;
        const fromIdx = activeDeck.words.findIndex(w => String(w.id) === dragSrcId);
        let toIdx = activeDeck.words.findIndex(w => String(w.id) === li.dataset.id);
        if (fromIdx < 0 || toIdx < 0) return;
        const [moved] = activeDeck.words.splice(fromIdx, 1);
        if (fromIdx < toIdx) toIdx--;
        if (!above) toIdx++;
        activeDeck.words.splice(toIdx, 0, moved);
        save();
        renderList();
      });
    });

    if (typeof applySearchFilter === 'function') applySearchFilter();
  }

  // インポート/エクスポート
  function toTSV(list) {
    return list.map(w => `${w.jp}\t${w.en}${w.reading ? '\t' + w.reading : ''}`).join('\n');
  }

  function parseTSV(text) {
    return text.split(/\r?\n/)
      .map(line => line.trim())
      .filter(Boolean)
      .map(line => {
        const [jp, en, reading] = line.split('\t').map(s => (s || '').trim());
        if (!jp || !en) return null;
        const entry = { jp, en };
        if (reading) entry.reading = reading;
        return entry;
      })
      .filter(Boolean);
  }

  document.getElementById('export-download').addEventListener('click', () => {
    if (activeDeck.words.length === 0) { showToast('漢字がありません'); return; }
    const blob = new Blob([toTSV(activeDeck.words)], { type: 'text/tab-separated-values' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safeTitle = (activeDeck.title || 'deck').replace(/[^a-zA-Z0-9一-龥ぁ-んァ-ヴー\-_]/g, '_');
    a.href = url;
    a.download = `${safeTitle}-${new Date().toISOString().slice(0,10)}.tsv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('ダウンロード完了');
  });

  document.getElementById('export-copy').addEventListener('click', async () => {
    if (activeDeck.words.length === 0) { showToast('漢字がありません'); return; }
    try {
      await navigator.clipboard.writeText(toTSV(activeDeck.words));
      showToast('クリップボードにコピー');
    } catch {
      showToast('コピーに失敗');
    }
  });

  const importArea = document.getElementById('import-area');
  const importText = document.getElementById('import-text');

  document.getElementById('import-paste').addEventListener('click', () => {
    importText.value = '';
    importArea.classList.add('show');
    importText.focus();
  });

  document.getElementById('import-cancel').addEventListener('click', () => {
    importArea.classList.remove('show');
  });

  document.getElementById('import-file').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });

  document.getElementById('file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    importText.value = text;
    importArea.classList.add('show');
    e.target.value = '';
  });

  function applyImport(replace) {
    const parsed = parseTSV(importText.value);
    if (parsed.length === 0) {
      showToast('読み取れる行がありません');
      return;
    }
    if (replace) {
      activeDeck.words = parsed.map(w => ({ ...w, id: Date.now() + Math.random() }));
    } else {
      const existing = new Set(activeDeck.words.map(w => `${w.jp}\t${w.en}`));
      let added = 0;
      parsed.forEach(w => {
        const key = `${w.jp}\t${w.en}`;
        if (!existing.has(key)) {
          activeDeck.words.push({ ...w, id: Date.now() + Math.random() });
          existing.add(key);
          added++;
        }
      });
      showToast(`${added} 件追加（重複 ${parsed.length - added} 件）`);
    }
    save();
    if (replace) showToast(`${parsed.length} 件で置き換え`);
    importArea.classList.remove('show');
    renderList();
    renderDeckList();
  }

  // ラウンド問題数設定
  const roundSelect = document.getElementById('round-size');
  roundSelect.value = roundSize;
  roundSelect.addEventListener('change', () => {
    roundSize = roundSelect.value;
    localStorage.setItem(ROUND_SIZE_KEY, roundSize);
    showToast(`1ラウンド ${roundSize === 'all' ? '全部' : roundSize + ' 問'} に設定`);
  });

  // モード切替
  function updateModeUI() {
    document.querySelectorAll('#mode-toggle .seg-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    roundSelect.disabled = (mode === 'memorize');
    roundSelect.style.opacity = roundSelect.disabled ? '0.5' : '1';
    document.body.classList.toggle('mode-memorize', mode === 'memorize');
  }
  document.querySelectorAll('#mode-toggle .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      mode = btn.dataset.mode;
      localStorage.setItem(MODE_KEY, mode);
      updateModeUI();
      updateBanner();
      showToast(mode === 'memorize' ? '覚えるモード（次のラウンドから）' : 'クイズモード（次のラウンドから）');
    });
  });
  updateModeUI();

  // 出題範囲設定
  const rangeStartEl = document.getElementById('range-start');
  const rangeCountEl = document.getElementById('range-count');
  const rangeResetBtn = document.getElementById('range-reset');
  const sliderStart = document.getElementById('range-slider-start');
  const sliderEnd = document.getElementById('range-slider-end');
  const sliderFill = document.getElementById('range-slider-fill');
  const rangeInfo = document.getElementById('range-info');
  const rangePrev = document.getElementById('range-prev');
  const rangeNext = document.getElementById('range-next');

  function getRequestedCount() {
    if (Number.isFinite(activeDeck.rangeCount) && activeDeck.rangeCount > 0) {
      return activeDeck.rangeCount;
    }
    if (Number.isFinite(activeDeck.rangeEnd) && activeDeck.rangeEnd > 0) {
      const s = Number.isFinite(activeDeck.rangeStart) && activeDeck.rangeStart > 0 ? activeDeck.rangeStart : 1;
      return activeDeck.rangeEnd - s + 1;
    }
    return null;
  }

  function updateRangeInputs() {
    const total = activeDeck.words.length;
    const cap = Math.max(1, total);
    const explicit = activeDeck.rangeStart || activeDeck.rangeCount || activeDeck.rangeEnd;
    const { start, end } = total > 0 ? getRange() : { start: 1, end: 1 };
    const requestedCount = getRequestedCount();

    sliderStart.max = cap;
    sliderEnd.max = cap;
    sliderStart.value = start;
    sliderEnd.value = end;

    rangeStartEl.max = cap;
    rangeCountEl.max = cap;
    rangeStartEl.placeholder = '1';
    rangeCountEl.placeholder = String(cap);
    rangeStartEl.value = activeDeck.rangeStart || '';
    rangeCountEl.value = requestedCount || '';

    const denom = cap > 1 ? cap - 1 : 1;
    const leftPct = ((start - 1) / denom) * 100;
    const rightPct = ((end - 1) / denom) * 100;
    sliderFill.style.left = leftPct + '%';
    sliderFill.style.width = Math.max(0, rightPct - leftPct) + '%';

    if (total === 0) {
      rangeInfo.textContent = '漢字なし';
    } else if (!explicit) {
      rangeInfo.textContent = `全範囲（${total}問）`;
    } else {
      const requested = requestedCount || (end - start + 1);
      const actual = end - start + 1;
      const suffix = requested !== actual ? `（実際 ${actual}問）` : '';
      rangeInfo.textContent = `${start}問目から ${requested}問${suffix}`;
    }

    rangePrev.disabled = total === 0 || start <= 1;
    const nextCount = requestedCount || (end - start + 1);
    rangeNext.disabled = total === 0 || (start + nextCount) > total;
  }

  function setRange(s, c) {
    activeDeck.rangeStart = s;
    activeDeck.rangeCount = c;
    delete activeDeck.rangeEnd;
    save();
    updateRangeInputs();
  }

  function applyRangeChange() {
    const total = activeDeck.words.length;
    const s = parseInt(rangeStartEl.value, 10);
    const c = parseInt(rangeCountEl.value, 10);
    let nextS = isNaN(s) || s < 1 ? null : Math.min(s, total || s);
    let nextC = isNaN(c) || c < 1 ? null : c;
    setRange(nextS, nextC);
  }

  rangeStartEl.addEventListener('change', applyRangeChange);
  rangeCountEl.addEventListener('change', applyRangeChange);

  sliderStart.addEventListener('input', () => {
    const total = activeDeck.words.length;
    if (total === 0) return;
    let s = +sliderStart.value;
    let e = +sliderEnd.value;
    if (s > e) e = s;
    setRange(s, e - s + 1);
  });
  sliderEnd.addEventListener('input', () => {
    const total = activeDeck.words.length;
    if (total === 0) return;
    let s = +sliderStart.value;
    let e = +sliderEnd.value;
    if (e < s) s = e;
    setRange(s, e - s + 1);
  });

  rangePrev.addEventListener('click', () => {
    const total = activeDeck.words.length;
    if (total === 0) return;
    const { start, end } = getRange();
    const count = getRequestedCount() || (end - start + 1);
    let newS = start - count;
    if (newS < 1) newS = 1;
    if (newS === start) return;
    setRange(newS, count);
  });
  rangeNext.addEventListener('click', () => {
    const total = activeDeck.words.length;
    if (total === 0) return;
    const { start, end } = getRange();
    const count = getRequestedCount() || (end - start + 1);
    let newS = start + count;
    if (newS > total) {
      showToast('これ以上進めません');
      return;
    }
    setRange(newS, count);
  });

  rangeResetBtn.addEventListener('click', () => {
    setRange(null, null);
    showToast('範囲をリセット');
  });

  document.getElementById('import-merge').addEventListener('click', () => applyImport(false));
  document.getElementById('import-replace').addEventListener('click', () => {
    if (!confirm(`現在の ${activeDeck.words.length} 件を全て削除して置き換えます。よろしいですか？`)) return;
    applyImport(true);
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // サブタブ切替
  document.querySelectorAll('.subtab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.subtab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.subpanel').forEach(p => p.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.subtab + '-subpanel').classList.add('active');
      if (t.dataset.subtab === 'decks') renderDeckList();
      if (t.dataset.subtab === 'presets') loadPresetList();
    });
  });

  // デッキ管理
  function renderDeckList() {
    const activeEl = document.getElementById('deck-active');
    const othersEl = document.getElementById('deck-others');
    if (!activeEl || !othersEl) return;
    activeEl.innerHTML = renderDeckCard(activeDeck, true);
    const others = decks.filter(d => d.id !== activeDeck.id);
    othersEl.innerHTML = others.length
      ? others.map(d => renderDeckCard(d, false)).join('')
      : '<div class="deck-empty">他のデッキはまだありません</div>';
    bindDeckCardEvents();
  }

  function renderDeckCard(deck, isActive) {
    return `
      <div class="deck-card ${isActive ? 'active' : ''}" data-id="${deck.id}">
        <div class="deck-info">
          <div class="deck-title">${escapeHtml(deck.title)}</div>
          <div class="deck-meta">${deck.words.length} 字</div>
        </div>
        <div class="deck-btns">
          ${!isActive ? `<button class="deck-mini-btn primary" data-action="activate">使う</button>` : ''}
          <button class="deck-mini-btn" data-action="rename">名前</button>
          <button class="deck-mini-btn" data-action="duplicate">複製</button>
          <button class="deck-mini-btn danger" data-action="delete">削除</button>
        </div>
      </div>
    `;
  }

  function bindDeckCardEvents() {
    document.querySelectorAll('.deck-card .deck-mini-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const card = btn.closest('.deck-card');
        const id = card.dataset.id;
        const action = btn.dataset.action;
        const deck = decks.find(d => d.id === id);
        if (!deck) return;
        if (action === 'activate') {
          setActiveDeck(id);
          showToast(`「${deck.title}」に切替`);
        } else if (action === 'rename') {
          const newTitle = prompt('デッキ名', deck.title);
          if (newTitle && newTitle.trim()) {
            deck.title = newTitle.trim();
            save();
            updateBanner();
            renderDeckList();
          }
        } else if (action === 'duplicate') {
          const copy = {
            id: genId(),
            title: deck.title + ' (コピー)',
            words: deck.words.map(w => ({ ...w, id: Date.now() + Math.random() }))
          };
          decks.push(copy);
          save();
          renderDeckList();
          showToast(`複製しました`);
        } else if (action === 'delete') {
          if (decks.length <= 1) { showToast('最後のデッキは削除できません'); return; }
          if (!confirm(`デッキ「${deck.title}」を削除します。よろしいですか？`)) return;
          decks = decks.filter(d => d.id !== id);
          if (activeDeck.id === id) {
            activeDeck = decks[0];
            localStorage.setItem(ACTIVE_DECK_KEY, activeDeck.id);
            updateBanner();
          }
          save();
          renderDeckList();
          renderList();
        }
      });
    });
  }

  document.getElementById('deck-create').addEventListener('click', () => {
    const title = prompt('新しいデッキの名前', '新規デッキ');
    if (!title || !title.trim()) return;
    const newDeck = { id: genId(), title: title.trim(), words: [] };
    decks.push(newDeck);
    save();
    setActiveDeck(newDeck.id);
    showToast(`「${newDeck.title}」を作成`);
  });

  // プリセット読込
  async function loadPresetList() {
    const listEl = document.getElementById('preset-list');
    listEl.innerHTML = '<div class="deck-empty">読み込み中...</div>';
    try {
      if (!availablePresets.length) {
        const res = await fetch('presets.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error('not ok');
        availablePresets = await res.json();
      }
      if (!availablePresets.length) {
        listEl.innerHTML = '<div class="deck-empty">プリセットがありません</div>';
        return;
      }
      listEl.innerHTML = availablePresets.map((p, i) => `
        <div class="preset-item">
          <div class="preset-title">${escapeHtml(p.title)}</div>
          <div class="preset-file">${escapeHtml(p.file)}</div>
          <button class="deck-mini-btn primary" data-i="${i}">読込</button>
        </div>
      `).join('');
      listEl.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => loadPreset(availablePresets[+btn.dataset.i]));
      });
    } catch (e) {
      listEl.innerHTML = '<div class="deck-empty">プリセットを読み込めません<br><small>(ローカル file:// では fetch できません)</small></div>';
    }
  }

  async function loadPreset(preset) {
    try {
      const res = await fetch(preset.file, { cache: 'no-cache' });
      if (!res.ok) throw new Error('not ok');
      const text = await res.text();
      const parsed = parseTSV(text);
      const newDeck = {
        id: genId(),
        title: preset.title,
        words: parsed.map(w => ({ ...w, id: Date.now() + Math.random() }))
      };
      decks.push(newDeck);
      save();
      setActiveDeck(newDeck.id);
      showToast(`「${preset.title}」を読込（${parsed.length} 字）`);
    } catch (e) {
      showToast('読込に失敗');
    }
  }

  updateBanner();
  updateRangeInputs();
  startRound();
</script>
</body>
</html>
